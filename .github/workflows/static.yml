# CI workflow for ProcGuard
name: ProcGuard CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f ProcGuard/ProcGuard/requirements.txt ]; then
            pip install -r ProcGuard/ProcGuard/requirements.txt
          fi

      - name: Check shell scripts are executable
        run: |
          echo "Listing shell scripts..."
          find . -name "*.sh" | head -20
